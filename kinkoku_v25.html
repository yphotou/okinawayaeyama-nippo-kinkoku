<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>謹告台紙 通常版</title><!-- v11 -->
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#aaa;
  font-family:游明朝,"Yu Mincho","ヒラギノ明朝 ProN W3","Hiragino Mincho ProN",serif;
  display:flex;flex-direction:column;align-items:center;
  padding:30px 16px 80px;gap:36px;
}
.daishi{position:relative;background:#fff;border:3px solid #000;overflow:hidden;flex-shrink:0;}
.col{position:absolute;top:0;height:100%;writing-mode:vertical-rl;text-orientation:mixed;overflow:hidden;}

/* A: タイトル */
#col-title{
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;letter-spacing:6px;line-height:1.0;padding:4px;
}

/* C: 故人名 */
#col-kojin{
  writing-mode:horizontal-tb;display:flex;flex-direction:row;direction:rtl;
  align-items:stretch;padding:4px 0;overflow:hidden;
}
.kj-kana-col{
  writing-mode:vertical-rl;font-size:9px;line-height:1.2;flex-shrink:0;
  width:12px;direction:ltr;padding-top:4px;color:#555;
}
.kj-main-col{
  writing-mode:vertical-rl;flex:1 1 0;direction:ltr;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
}
.kj-zoku{font-size:11px;display:block;}
.kj-kanji{font-size:28px;font-weight:900;letter-spacing:2px;line-height:1.0;display:block;}
.kj-gi{font-size:11px;display:block;margin-top:2px;}

/* D-i: 前文施設名 */
#col-maebun-nai{font-size:8px;line-height:1.45;padding:5px 2px;overflow:hidden;}
/* D: 前文枠 */
#col-maebun{
  font-size:8px;line-height:1.55;border:2px solid #000;
  margin:5px 0;height:calc(100% - 10px);padding:4px 3px;overflow:hidden;
}
/* Ki: 記 */
#col-ki{font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;padding:4px 2px;}
/* Dt: 日時 */
#col-datetime{font-size:10px;line-height:1.5;padding:5px 2px;overflow:hidden;}
.dt-label{font-weight:bold;font-size:13px;display:block;margin-bottom:3px;}
/* Ba: 場所 */
#col-venue{font-size:10px;line-height:1.4;padding:5px 2px;overflow:hidden;}
.v-label{font-weight:bold;font-size:13px;display:block;margin-bottom:3px;}
.v-name{font-size:13px;font-weight:bold;display:block;line-height:1.1;}
.v-sub{font-size:8px;display:block;}
/* K: 付記 */
#col-chui{font-size:8.5px;line-height:1.4;padding:4px 1px;overflow:hidden;display:flex;flex-direction:column;}
.chui-item{writing-mode:vertical-rl;font-size:8.5px;line-height:1.4;flex-shrink:0;width:28px;padding:0 1px;}
/* I: 掲載日 */
#col-pubdate{font-size:9.5px;line-height:1.3;padding:5px 1px;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* G: 喪主 - horizontal-tb+flex-columnで縦積み、span単位でvertical-rl */
#col-soshu{
  writing-mode:horizontal-tb;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 2px;overflow:hidden;
}
.ss-span{
  writing-mode:vertical-rl;text-orientation:upright;
  display:block;text-align:center;
}
.ss-mark{font-size:9px;writing-mode:vertical-rl;text-orientation:upright;text-align:center;margin-bottom:2px;flex-shrink:0;}
.ss-label{font-size:11px;font-weight:bold;writing-mode:vertical-rl;text-orientation:upright;text-align:center;margin-bottom:2px;flex-shrink:0;}
.ss-kana{font-size:7px;color:#555;display:block;text-align:center;margin-top:1px;text-orientation:mixed;}
.ss-zoku{font-size:10px;writing-mode:vertical-rl;text-orientation:upright;text-align:center;margin-top:2px;flex-shrink:0;}
.ss-name{font-size:13px;font-weight:bold;writing-mode:vertical-rl;text-orientation:upright;text-align:center;letter-spacing:1px;margin-top:2px;flex-shrink:0;}

/* H: 住所 */
#col-addr{font-size:8px;line-height:1.4;padding:5px 1px;overflow:hidden;text-orientation:upright;}

/* J: 連名 */
#col-renmei{position:absolute;top:0;height:100%;overflow:hidden;}
.renmei-single{
  writing-mode:horizontal-tb;display:flex;flex-direction:row;
  align-items:flex-end;height:100%;padding-bottom:8px;
}
.renmei-2dan{writing-mode:horizontal-tb;display:flex;flex-direction:column;height:100%;}
.renmei-row-upper{display:flex;flex-direction:row;align-items:flex-end;height:50%;padding-bottom:4px;}
.renmei-row-lower{display:flex;flex-direction:row;align-items:flex-end;height:50%;padding-bottom:4px;}
.r-item{
  writing-mode:vertical-rl;font-size:11px;line-height:1.2;
  text-align:center;flex-shrink:0;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:90%;
}
.r-mark{font-size:8px;display:block;text-align:center;margin-bottom:1px;}

/* フォームUI */
.card{background:#fff;border-radius:12px;padding:28px 32px;width:min(860px,95vw);box-shadow:0 4px 20px rgba(0,0,0,.15);}
.card h2{font-size:1.15rem;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #333;}
.sec{font-weight:bold;font-size:.85rem;margin:20px 0 8px;color:#555;}
.f{margin-bottom:12px;}
.f label{display:block;font-size:.8rem;color:#555;margin-bottom:4px;}
.f input,.f select,.f textarea{width:100%;border:1px solid #ccc;border-radius:6px;padding:7px 10px;font-size:.95rem;font-family:inherit;}
.f textarea{resize:vertical;min-height:80px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dtf{margin-bottom:12px;}
.dtf>label{display:block;font-size:.8rem;color:#555;margin-bottom:4px;}
.dtr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dtr input[type="date"]{flex:1 1 130px;}
.dtr input[type="time"]{flex:0 0 90px;}
.kp{background:#f5f5f5;border-radius:6px;padding:6px 10px;font-size:.85rem;color:#333;margin-top:4px;}
.kp small{color:#888;margin-right:4px;}
.checks{display:flex;flex-direction:column;gap:8px;}
.chk{display:flex;align-items:center;gap:8px;font-size:.85rem;cursor:pointer;}
.chk input{width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.sld label{font-size:.8rem;color:#555;}
.sld small{font-size:.8rem;color:#444;}
.btn-go{display:block;width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:16px;}
.btn-go:hover{background:#16213e;}
.btn-pr{display:block;width:100%;padding:12px;background:#2d6a4f;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:8px;}
@media print{body{background:#fff;padding:0;}.card{display:none;}.daishi{border:none;}}
</style>
</head>
<body>
<div id="daishi" class="daishi"></div>
<div class="card">
  <h2>謹告 通常版 ― 情報入力</h2>
  <p class="sec">◈ 前文パターン</p>
  <div class="f">
    <select id="maebun_type" onchange="onMaebunChange()">
      <option value="eimu">永眠（一般）</option>
      <option value="byoki">病気療養中</option>
      <option value="furyou">不慮の事故</option>
      <option value="tenju">天寿（老衰）</option>
      <option value="shichishichi">七七忌</option>
    </select>
  </div>
  <div class="f" id="shichi_wrap" style="display:none">
    <label>七七忌 繰り上げ法要日（漢数字）</label>
    <input type="text" id="shichi_dt" placeholder="例：四月二十日（日）" oninput="render()">
  </div>
  <p class="sec">◈ 故人情報</p>
  <div class="r2">
    <div class="f"><label>続柄</label><input type="text" id="zokugara" oninput="render()"></div>
    <div class="f"><label>享年（漢数字）</label><input type="text" id="kyonen" oninput="render()"></div>
  </div>
  <div class="r2">
    <div class="f"><label>故人氏名</label><input type="text" id="kojin_name" oninput="render()"></div>
    <div class="f"><label>ふりがな</label><input type="text" id="kojin_kana" oninput="render()"></div>
  </div>
  <div class="dtf">
    <label>死亡日時</label>
    <div class="dtr">
      <input type="date" id="shibo_date" oninput="calcKanji()">
      <input type="time" id="shibo_time" oninput="calcKanji()">
      <div class="kp"><small>漢数字</small><span id="kj_shibo"></span></div>
    </div>
  </div>
  <p class="sec">◈ 葬儀情報</p>
  <div class="dtf">
    <label>通夜 日時</label>
    <div class="dtr">
      <input type="date" id="tuya_date" oninput="calcKanji()">
      <input type="time" id="tuya_from" oninput="calcKanji()">
      <span style="color:#888">〜</span>
      <input type="time" id="tuya_to" oninput="calcKanji()">
      <div class="kp"><small>漢数字</small><span id="kj_tuya"></span></div>
    </div>
  </div>
  <div class="dtf">
    <label>告別式 日時</label>
    <div class="dtr">
      <input type="date" id="koku_date" oninput="calcKanji()">
      <input type="time" id="koku_from" oninput="calcKanji()">
      <span style="color:#888">〜</span>
      <input type="time" id="koku_to" oninput="calcKanji()">
      <div class="kp"><small>漢数字</small><span id="kj_koku"></span></div>
    </div>
  </div>
  <div class="f">
    <label>葬祭場</label>
    <select id="sosai_ba" onchange="onSosaiChange()">
      <option value="sunray">サンレー石垣紫雲閣（真栄里）</option>
      <option value="sanpodo">三宝堂葬斎場（新川産業道路沿い）</option>
      <option value="yuihall">葬祭センターゆいホール（真栄里公園西隣り）</option>
      <option value="jitaku">自宅</option>
      <option value="other">その他（自由入力）</option>
    </select>
  </div>
  <div class="f" id="extra_wrap" style="display:none">
    <label id="extra_label">住所・詳細</label>
    <input type="text" id="extra_addr" oninput="render()">
  </div>
  <div class="f">
    <label>施設名(改謝文の「○○」部分)</label>
    <input type="text" id="shisetsu_name" oninput="render()" placeholder="例：○○病院、○○ホーム">
  </div>
  <p class="sec">◈ 付記</p>
  <div class="checks">
    <label class="chk"><input type="checkbox" id="chk_kyoka" onchange="render()"> <span>※勝手ながらご供花の儀はご辞退申し上げます。</span></label>
    <label class="chk"><input type="checkbox" id="chk_shichi_note" onchange="render()"> <span>※七七忌の法要は近親者にて相営みますのでご了承下さい。</span></label>
    <label class="chk"><input type="checkbox" id="chk_koden" onchange="render()"> <span>※勝手ながら香典の儀はご辞退申し上げます。</span></label>
  </div>
  <p class="sec">◈ 喪主・遺族情報</p>
  <div class="r2">
    <div class="f"><label>喪主続柄</label><input type="text" id="soshu_zoku" oninput="render()"></div>
    <div class="f"><label>喪主氏名</label><input type="text" id="soshu_name" oninput="render()"></div>
  </div>
  <div class="r2">
    <div class="f"><label>喪主ふりがな</label><input type="text" id="soshu_kana" oninput="render()"></div>
    <div class="f"><label>喪主住所</label><input type="text" id="soshu_addr" oninput="render()"></div>
  </div>
  <div class="f">
    <label>遺族連名（1行1名 ※喪主以外。空欄=「喪主＋外親戚一同」1段。1名以上=人数の半分で折り返し2段表示）</label>
    <textarea id="renmei" oninput="render()"></textarea>
  </div>
  <div class="sld" style="margin-top:12px">
    <label>連名: <small id="fw_info">0名</small></label>
  </div>
  <button class="btn-go" onclick="render()">▶ プレビュー更新</button>
  <button class="btn-pr" onclick="window.print()">🖨 印刷 / PDFとして保存</button>
</div>
<script>
const KAN=['〇','一','二','三','四','五','六','七','八','九'];
function n2k(n){n=parseInt(n);if(isNaN(n)||n<=0)return'〇';if(n<10)return KAN[n];if(n===10)return'十';if(n<20)return'十'+(n%10?KAN[n%10]:'');const t=Math.floor(n/10),o=n%10;return KAN[t]+'十'+(o?KAN[o]:'');}
function wareki(y,m,d){y=parseInt(y);m=parseInt(m);d=parseInt(d);const dt=new Date(y,m-1,d);if(dt>=new Date(2019,4,1)){const yr=y-2018;return'令和'+(yr===1?'元':n2k(yr))+'年'+n2k(m)+'月'+n2k(d)+'日';}if(dt>=new Date(1989,0,8)){const yr=y-1988;return'平成'+(yr===1?'元':n2k(yr))+'年'+n2k(m)+'月'+n2k(d)+'日';}return y+'年'+n2k(m)+'月'+n2k(d)+'日';}
function md(s){if(!s)return'';const[y,mm,dd]=s.split('-');return n2k(mm)+'月'+n2k(dd)+'日';}
function t2k(s){if(!s)return'';const[h,mi]=s.split(':').map(Number);const ap=h<12?'午前':'午後';const h12=h===0?12:h>12?h-12:h;return ap+n2k(h12)+'時'+(mi>0?n2k(mi)+'分':'');}
function todayWareki(){const n=new Date();return wareki(n.getFullYear(),n.getMonth()+1,n.getDate());}
function esc(s){s=String(s||'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const KJ={shibo:'',tuya:'',koku:''};
function calcKanji(){
  const sd=document.getElementById('shibo_date').value,st=document.getElementById('shibo_time').value;
  if(sd&&st){const[y,m,d]=sd.split('-');KJ.shibo=wareki(y,m,d)+t2k(st);document.getElementById('kj_shibo').textContent=KJ.shibo;}
  const tdate=document.getElementById('tuya_date').value,tfrom=document.getElementById('tuya_from').value,tto=document.getElementById('tuya_to').value;
  if(tdate&&tfrom&&tto){const[th]=tto.split(':').map(Number);const th12=th>12?th-12:th;KJ.tuya=md(tdate)+t2k(tfrom)+'〜'+n2k(th12)+'時';document.getElementById('kj_tuya').textContent=KJ.tuya;}
  const kdate=document.getElementById('koku_date').value,kfrom=document.getElementById('koku_from').value,kto=document.getElementById('koku_to').value;
  if(kdate&&kfrom&&kto){const[kh]=kto.split(':').map(Number);const kh12=kh>12?kh-12:kh;KJ.koku=md(kdate)+t2k(kfrom)+'〜'+n2k(kh12)+'時';document.getElementById('kj_koku').textContent=KJ.koku;}
  render();
}
const SOSAI={sunray:'サンレー石垣紫雲閣（真栄里）',sanpodo:'三宝堂葬斎場（新川産業道路沿い・元川花給油所向い）',yuihall:'葬祭センターゆいホール（真栄里公園西隣り）',jitaku:'自宅',other:''};
function onSosaiChange(){
  const v=document.getElementById('sosai_ba').value,w=document.getElementById('extra_wrap'),l=document.getElementById('extra_label');
  if(v==='jitaku'){w.style.display='block';l.textContent='自宅住所';}else if(v==='other'){w.style.display='block';l.textContent='葬祭場名・住所';}else w.style.display='none';
  render();
}
function getSosai(){
  const v=document.getElementById('sosai_ba').value;
  if(v==='jitaku')return'自宅（'+(document.getElementById('extra_addr').value||'')+'）';
  if(v==='other')return document.getElementById('extra_addr').value||'';
  return SOSAI[v];
}
function onMaebunChange(){document.getElementById('shichi_wrap').style.display=document.getElementById('maebun_type').value==='shichishichi'?'block':'none';render();}
function getMaebun(type,kyonen,shiboDt){
  const tail='ここに生前のご厚誼を深謝し謹んでお知らせ致します。尚、告別式は左記の通り相営みます。';
  switch(type){
    case'eimu':return shiboDt+'、'+kyonen+'を以て永眠致しました。'+tail;
    case'byoki':return'病気療養中のところ'+shiboDt+'、'+kyonen+'を以て永眠致しました。'+tail;
    case'furyou':return'不慮の事故により'+shiboDt+'、'+kyonen+'を以て急逝致しました。'+tail;
    case'tenju':return shiboDt+'、'+kyonen+'の天寿を全うし永眠致しました。'+tail;
    case'shichishichi':{const sdt=document.getElementById('shichi_dt').value||'●月●日（○）';return shiboDt+'、'+kyonen+'を以て永眠致しました。'+tail+'※七七忌の法要は初七日の'+sdt+'に繰り上げ法要として四十九日と併せて執り行いますのでご了承下さい。';}
    default:return'';
  }
}
function getMaebunNai(){const name=document.getElementById('shisetsu_name').value||'';if(!name)return'';return name+'のスタッフ皆様の献身的な介護・看護に深く感謝申し上げます。';}
function getChuiLines(){
  const ls=[];
  if(document.getElementById('chk_kyoka').checked)ls.push('※勝手ながらご供花の儀はご辞退申し上げます。');
  if(document.getElementById('chk_shichi_note').checked)ls.push('※七七忌の法要は近親者にて相営みますのでご了承下さい。');
  if(document.getElementById('chk_koden').checked)ls.push('※勝手ながら香典の儀はご辞退申し上げます。');
  return ls;
}

function render(){
  const renmeiRaw=(document.getElementById('renmei').value||'').split('\n').filter(l=>l.trim());
  const totalRenmei=renmeiRaw.length;
  document.getElementById('fw_info').textContent=totalRenmei+'名';
  const zokugara=document.getElementById('zokugara').value||'';
  const kyonen=document.getElementById('kyonen').value||'享年●歳';
  const kojinName=document.getElementById('kojin_name').value||'';
  const kojinKana=document.getElementById('kojin_kana').value||'';
  const soshuZoku=document.getElementById('soshu_zoku').value||'';
  const soshuName=document.getElementById('soshu_name').value||'';
  const soshuKana=document.getElementById('soshu_kana').value||'';
  const soshuAddr=document.getElementById('soshu_addr').value||'';
  const type=document.getElementById('maebun_type').value;
  const shiboDt=KJ.shibo||'●月●日午後●時●分';
  const maebun=getMaebun(type,kyonen,shiboDt);
  const maebunNai=getMaebunNai();
  const sosai=getSosai();
  const chuiLines=getChuiLines();
  const pubDate=todayWareki();

  const H=300;
  const PAD=6;
  const wA=56;
  const wC=70;
  const wDi=maebunNai?46:0;
  const wD=106;
  const wKi=22;
  const wDt=86;
  const wBa=86;
  const wK=chuiLines.length>0?30*chuiLines.length:0;
  const wI=22;
  const wG=52;
  const wH=20;

  const ITEM_W=24;
  let renmeiHTML='',renmeiWidth=0;
  if(totalRenmei===0){
    // 簡易版: 喪主□□ + 外親戚一同 を1段
    renmeiWidth=ITEM_W;
    renmeiHTML=
      '<div class="renmei-single">'+
        '<span class="r-item" style="width:'+ITEM_W+'px;font-size:11px;letter-spacing:1px">外親戚一同</span>'+
      '</div>';
  } else {
    // 通常版: ceil(n/2)で折り返し2段
    const half=Math.ceil(totalRenmei/2);
    const upper=renmeiRaw.slice(0,half);
    const lower=renmeiRaw.slice(half);
    renmeiWidth=ITEM_W*half;
    renmeiHTML='<div class="renmei-2dan">'+
      '<div class="renmei-row-upper">'+
        upper.map(l=>'<span class="r-item" style="width:'+ITEM_W+'px"><span class="r-mark">□</span>'+esc(l)+'</span>').join('')+
      '</div>'+
      '<div class="renmei-row-lower">'+
        lower.map(l=>'<span class="r-item" style="width:'+ITEM_W+'px"><span class="r-mark">□</span>'+esc(l)+'</span>').join('')+
      '</div>'+
      '</div>';
  }
  const wJ=renmeiWidth;
  const totalW=PAD*2+wJ+wH+wG+wI+wK+wBa+wDt+wKi+wD+wDi+wC+wA;
  const daishi=document.getElementById('daishi');
  daishi.style.width=totalW+'px';
  daishi.style.height=H+'px';

  let x=PAD;
  const xJ=x;x+=wJ;
  const xH=x;x+=wH;
  const xG=x;x+=wG;
  const xI=x;x+=wI;
  let xK=-1;if(wK>0){xK=x;x+=wK;}
  const xBa=x;x+=wBa;
  const xDt=x;x+=wDt;
  const xKi=x;x+=wKi;
  const xD=x;x+=wD;
  const xDi=x;x+=wDi;
  const xC=x;x+=wC;
  const xA=x;

  daishi.innerHTML='';
  function col(id,left,width,html){
    if(width<=0)return;
    const d=document.createElement('div');
    d.className='col';if(id)d.id=id;
    d.style.left=left+'px';d.style.width=width+'px';
    d.innerHTML=html;daishi.appendChild(d);
  }

  col('col-title',xA,wA,'告別式のお知らせ');
  col('col-kojin',xC,wC,
    '<span class="kj-kana-col">'+esc(kojinKana)+'</span>'+
    '<span class="kj-main-col">'+
      '<span class="kj-zoku">'+esc(zokugara)+'</span>'+
      '<span class="kj-kanji">'+esc(kojinName)+'</span>'+
      '<span class="kj-gi">儀</span>'+
    '</span>'
  );
  col('col-maebun',xD,wD,esc(maebun));
  if(wDi>0)col('col-maebun-nai',xDi,wDi,esc(maebunNai));
  col('col-ki',xKi,wKi,'記');
  const tuyaText=KJ.tuya?'通夜　'+KJ.tuya:'';
  const kokuText=KJ.koku?'告別式　'+KJ.koku:'告別式　●';
  col('col-datetime',xDt,wDt,
    '<span class="dt-label">日時</span>'+
    (tuyaText?'<span style="display:block;font-size:10px;line-height:1.5">'+esc(tuyaText)+'</span>':'')+
    '<span style="display:block;font-size:10px;line-height:1.5">'+esc(kokuText)+'</span>'
  );
  const sm=sosai.match(/^([^（(]+)/);
  const sosaiMain=sm?sm[1].trim():sosai;
  const sosaiSub=sosai.replace(sosaiMain,'').trim();
  col('col-venue',xBa,wBa,
    '<span class="v-label">場所</span>'+
    '<span class="v-name">'+esc(sosaiMain)+'</span>'+
    (sosaiSub?'<span class="v-sub">'+esc(sosaiSub)+'</span>':'')
  );
  if(wK>0)col('col-chui',xK,wK,chuiLines.map(l=>'<span class="chui-item">'+esc(l)+'</span>').join(''));
  col('col-pubdate',xI,wI,pubDate);

  // 喪主: □マーク＋喪主ラベル＋ふりがな＋続柄＋氏名
  col('col-soshu',xG,wG,
    '<span class="ss-mark">□</span>'+
    '<span class="ss-label">喪主</span>'+
    (soshuKana?'<span class="ss-kana">'+esc(soshuKana)+'</span>':'')+
    '<span class="ss-zoku">'+esc(soshuZoku)+'</span>'+
    '<span class="ss-name">'+esc(soshuName)+'</span>'
  );

  col('col-addr',xH,wH,soshuAddr?'（自宅＝'+esc(soshuAddr)+'）':'');

  if(wJ>0){
    const d=document.createElement('div');
    d.id='col-renmei';d.style.left=xJ+'px';d.style.width=wJ+'px';
    d.innerHTML=renmeiHTML;daishi.appendChild(d);
  }
}
window.onload=function(){calcKanji();};
</script>
</body>
</html>
